<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Login</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- Tailwind + Daisy -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Custom CSS -->
    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen bg-base-200">
    <div class="max-w-md md:max-w-2xl lg:max-w-5xl xl:max-w-7xl mx-auto">
      <div class="logo w-[263px] mx-auto pt-[210px]">
        <img src="./assets/Logo-full.png" alt="" />
      </div>
      <div class="form">
        <div
          class="card bg-base-100 w-full max-w-sm shrink-0 mx-auto my-8 rounded-3xl"
        >
          <div class="card-body">
            <fieldset class="fieldset">
              <label class="label font-medium text-base text-neutral"
                >Mobile Number </label
              >
              <input
                id="input-number"
                maxlength="11"
                type="text"
                class="input rounded-[32px] bg-[#F4F5F7] border-none mb-4"
                placeholder="Enter 01713078749"
              />

              <label class="label font-medium text-base text-neutral"
                >4 Digit Pin</label
              >
              <input
                id="input-pin"
                maxlength="4"
                type="password"
                class="input rounded-[32px] bg-[#F4F5F7] border-none"
                placeholder="Enter 4351"
              />

              <button
                id="login-btn"
                class="btn btn-primary mt-4 rounded-[32px] text-base text-white"
              >
                Login
              </button>
            </fieldset>
          </div>
        </div>
      </div>
    </div>
    <script></script>
    <script src="./js/login.js"></script>
  </body>
</html>
