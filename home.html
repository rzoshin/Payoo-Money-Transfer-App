<!doctype html>
<html data-theme="light" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Home</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- Tailwind + Daisy -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Custom CSS -->
    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen max-w-md mx-auto bg-base-200">
    <header class="border-b border-neutral/10 px-6 py-2.5 sticky top-0 bg-base-200 z-10">
      <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
        <div class="left flex gap-2">
          <img class="w-15" src="./assets/logo.png" alt="" />
          <div class="flex flex-col">
            <h2 class="font-extrabold text-lg">
              $ <span id="balance">45000</span>
            </h2>
            <p class="text-sm text-neutral/50 font-normal">Available Balance</p>
          </div>
        </div>
        <div class="right">
          <a
            class="btn btn-outline btn-soft text-neutral/50 font-normal"
            href="./index.html"
            ><i
              class="fa-solid fa-arrow-right-from-bracket text-[#080808]/50"
            ></i
            >Log Out</a
          >
        </div>
      </section>
    </header>
    <main>
      <section id="welcome-text" class="w-11/12 mx-auto pt-8 pb-6 space-y-2">
        <h1 class="font-bold text-2xl leading-7">
          Welcome to Pay<span class="text-primary">oo</span>
        </h1>
        <p class="text-neutral/50 leading-7 font-normal">
          Enjoy easy and convenient financial services with us. Cashout charge
          is low and
        </p>
      </section>
      <section
        id="card-section"
        class="buttons w-11/12 mx-auto grid grid-cols-3 justify-evenly gap-[16.5px] mb-6"
      >
        <button
          class="btn btn-soft btn-primary flex flex-col h-full justify-center items-center px-2.5 py-5 rounded-xl border border-neutral/10"
        >
          <img src="./assets/opt-1.png" alt="" />
          <p class="font-normal text-sm text-neutral/70">Add Money</p>
        </button>
        <button
          class="btn btn-soft btn-primary flex flex-col h-full justify-center items-center px-2.5 py-5 rounded-xl border border-neutral/10"
        >
          <img src="./assets/opt-2.png" alt="" />
          <p class="font-normal text-sm text-neutral/70">Cashout</p>
        </button>
        <button
          class="btn btn-soft btn-primary flex flex-col h-full justify-center items-center px-2.5 py-5 rounded-xl border border-neutral/10"
        >
          <img src="./assets/opt-3.png" alt="" />
          <p class="font-normal text-sm text-neutral/70">Transfer Money</p>
        </button>
        <button
          class="btn btn-soft btn-primary flex flex-col h-full justify-center items-center px-2.5 py-5 rounded-xl border border-neutral/10"
        >
          <img src="./assets/opt-4.png" alt="" />
          <p class="font-normal text-sm text-neutral/70">Get Bonus</p>
        </button>
        <button
          class="btn btn-soft btn-primary flex flex-col h-full justify-center items-center px-2.5 py-5 rounded-xl border border-neutral/10"
        >
          <img src="./assets/opt-5.png" alt="" />
          <p class="font-normal text-sm text-neutral/70">Pay Bill</p>
        </button>
        <button
          class="btn btn-soft btn-primary flex flex-col h-full justify-center items-center px-2.5 py-5 rounded-xl border border-neutral/10"
        >
          <img src="./assets/opt-6.png" alt="" />
          <p class="font-normal text-sm text-neutral/70">Transactions</p>
        </button>
      </section>

      <section id="cashout" class="bg-[#F4F5F7]">
        <div class="w-11/12 mx-auto">
          <h2 class="font-semibold text-lg py-4">Cash Out</h2>
          <div class="form pb-5">
            <div
              class="card bg-base-100 w-full rounded-3xl"
            >
              <div class="card-body">
                <fieldset class="fieldset">
                  <label class="label font-medium text-base text-neutral/70 mb-2"
                    >Agent Number</label
                  >
                  <input
                    id="cashout-number"
                    maxlength="11"
                    type="text"
                    class="input rounded-[32px] bg-[#F4F5F7] border-none mb-4 font-light w-full"
                    placeholder="Enter 11 digit number"
                  />

                  <label class="label font-medium text-base text-neutral/70 mb-2"
                    >Amount</label
                  >
                  <input
                    id="cashout-amount"
                    maxlength="11"
                    type="number"
                    class="input rounded-[32px] bg-[#F4F5F7] border-none mb-4 font-light w-full"
                    placeholder="Enter amount to withdraw"
                  />

                  <label class="label font-medium text-base text-neutral/70 mb-2"
                    >Pin Number</label
                  >
                  <input
                    id="cashout-pin"
                    maxlength="4"
                    type="password"
                    class="input rounded-[32px] bg-[#F4F5F7] border-none font-light w-full"
                    placeholder="Enter 4 digit pin number"
                  />

                  <button
                    id="cashout-btn"
                    class="btn btn-primary mt-4 rounded-[32px] text-base text-white"
                  >
                    Withdraw Money
                  </button>
                </fieldset>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>


    <script src="./js/cashout.js"></script>
  </body>
</html>
